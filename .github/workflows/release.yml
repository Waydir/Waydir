name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            rpm fakeroot patchelf \
            libfuse2 desktop-file-utils

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and vendor waydir_core
        run: scripts/build_waydir_core.sh

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Install fastforge
        run: dart pub global activate fastforge

      - name: Install appimagetool
        run: |
          # AppImage compatibility needs two things:
          #  - gzip-compressed squashfs (classic AppImageKit appimagetool's
          #    default), readable by older libappimage / AppImageLauncher /
          #    squashfuse. The newer appimagetool defaults to zstd, which those
          #    cannot read ("Squashfs image uses (null) compression").
          #  - a statically linked type2 runtime, so the AppImage mounts itself
          #    without a system libfuse.so.2 (absent on modern fuse3-only
          #    distros like Fedora).
          # fastforge runs whatever `appimagetool` is on PATH; wrap it to always
          # inject the static runtime.
          curl -sSL -o /usr/local/bin/appimagetool.real \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          curl -sSL -o /usr/local/bin/appimage-runtime-x86_64 \
            https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'export ARCH="${ARCH:-x86_64}"' \
            'exec /usr/local/bin/appimagetool.real --runtime-file /usr/local/bin/appimage-runtime-x86_64 "$@"' \
            > /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool /usr/local/bin/appimagetool.real /usr/local/bin/appimage-runtime-x86_64

      - name: Read version
        id: version
        run: echo "version=$(grep '^version:' pubspec.yaml | sed -E 's/version:\s*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')" >> $GITHUB_OUTPUT

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          mkdir -p dist
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/dist/waydir-${{ steps.version.outputs.version }}-linux-x64.tar.gz" .

      - name: Package deb / rpm / appimage via fastforge
        env:
          # Runner has no FUSE for the appimagetool AppImage itself; extract and run.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          # Bundled libraries (Flutter engine) ship inside the package;
          # do not let rpmbuild emit host-soname Requires for them.
          echo '%__requires_exclude_from ^/usr/share/[^/]+/lib/' > "$HOME/.rpmmacros"
          fastforge package --platform linux --targets deb,rpm,appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: dist/**/*

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get


      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and vendor waydir_core
        shell: pwsh
        run: scripts\build_waydir_core_windows.ps1

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Install fastforge
        run: dart pub global activate fastforge

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(grep '^version:' pubspec.yaml | sed -E 's/version:\s*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')" >> $GITHUB_OUTPUT

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package exe + zip via fastforge
        shell: pwsh
        run: |
          $env:Path += ";$env:LOCALAPPDATA\Pub\Cache\bin;C:\Program Files (x86)\Inno Setup 6"
          fastforge package --platform windows --targets exe,zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: dist/**/*

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get


      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and vendor waydir_core
        run: scripts/build_waydir_core.sh

      - name: Install fastforge
        run: dart pub global activate fastforge

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package dmg via fastforge
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          fastforge package --platform macos --targets dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: dist/**/*

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( \
            -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.tar.gz" \
            -o -name "*.exe" -o -name "*.zip" \
            -o -name "*.dmg" \
          \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Extract changelog section
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $version" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
